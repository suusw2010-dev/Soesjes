<body>

     <!DOCTY <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>

</head>
 <header>
 
    <nav class="main-menu"> 
        <a href="Homepage.html">De Soesjes</a>
  
    </nav> 
    </header>
<body>
   <div class="tictactoe-page">                                                                  
  
<div class="container">
  <h1>🎮 Tic Tac Toe</h1>
 <div class="info-container">
<button class="info-btn">i</button>
<div class="info-tekst">
welkom bij boter kaas en eieren. bij dit spel kan je zelf een emoji kiezen. je kan tegen iemand anders of tegen een bot spelen. veel speelplezier!
</div>
</div>
  <div id="picker">
    <div class="player-pick">
      <h2>Speler 1 — kies je emoji</h2>
      <div class="emoji-grid" id="grid-p1"></div>
    </div>
    <div class="player-pick">
      <h2>Speler 2 — kies je emoji</h2>
      <div class="emoji-grid" id="grid-p2"></div>
    </div>
    <button class="start-btn" id="start-btn" onclick="startGame()" disabled>Spelen!</button>
  </div>
 
  <div id="game">
    <div id="status"></div>
    <div class="mode">
      <label><input type="radio" name="mode" value="2p" checked onchange="setMode(this.value)"> 2 spelers</label>
      <label><input type="radio" name="mode" value="ai" onchange="setMode(this.value)"> Tegen computer</label>
    </div>
    <div id="board"></div>
    <div class="score">
      <span id="score-x"></span>
      <span>Gelijk: <b id="dw">0</b></span>
      <span id="score-o"></span>
    </div>
    <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center;">
      <button onclick="nextGame()">🔄 Opnieuw beginnen</button>
      <button class="back-btn" onclick="goBack()">← Andere emoji kiezen</button>
    </div>
  </div>
</div>
 
<script>
  const emojis = ['🐱','🐰','❤️','🍩','⭐','🐶','🦆','🌸'];
  let p1 = null, p2 = null;
  let board = Array(9).fill('');
  let current = 'X';
  let gameOver = false;
  let mode = '2p';
  let scores = {X: 0, O: 0, D: 0};
  let firstPlayer = 'X'; // wisselt na elk spel
  const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
 
  function buildGrids() {
    ['p1','p2'].forEach(player => {
      const grid = document.getElementById('grid-' + player);
      grid.innerHTML = '';
      emojis.forEach(e => {
        const btn = document.createElement('button');
        btn.className = 'emoji-btn';
        btn.textContent = e;
        btn.id = player + '-' + e;
        btn.onclick = () => selectEmoji(player, e);
        grid.appendChild(btn);
      });
    });
  }
 
  function selectEmoji(player, emoji) {
    if (player === 'p1') {
      p1 = emoji;
      document.querySelectorAll('#grid-p1 .emoji-btn').forEach(b => b.classList.remove('selected'));
    } else {
      p2 = emoji;
      document.querySelectorAll('#grid-p2 .emoji-btn').forEach(b => b.classList.remove('selected'));
    }
    document.getElementById(player + '-' + emoji).classList.add('selected');
    updateDisabled();
    document.getElementById('start-btn').disabled = !(p1 && p2 && p1 !== p2);
  }
 
  function updateDisabled() {
    emojis.forEach(e => {
      const b1 = document.getElementById('p1-' + e);
      const b2 = document.getElementById('p2-' + e);
      if (b1) b1.classList.toggle('disabled', e === p2);
      if (b2) b2.classList.toggle('disabled', e === p1);
    });
  }
 
  function startGame() {
    document.getElementById('picker').style.display = 'none';
    document.getElementById('game').style.display = 'flex';
    scores = {X: 0, O: 0, D: 0};
    firstPlayer = 'X';
    document.getElementById('score-x').innerHTML = p1 + ' wint: <b id="xw">0</b>';
    document.getElementById('score-o').innerHTML = p2 + ' wint: <b id="ow">0</b>';
    resetGame();
  }
 
  function nextGame() {
    // wissel wie er eerst begint
    firstPlayer = firstPlayer === 'X' ? 'O' : 'X';
    resetGame();
  }
 
  function goBack() {
    document.getElementById('game').style.display = 'none';
    document.getElementById('picker').style.display = 'flex';
  }
 
  function setMode(m) { mode = m; resetGame(); }
 
  function sym(player) { return player === 'X' ? p1 : p2; }
 
  function resetGame() {
    board = Array(9).fill('');
    current = firstPlayer;
    gameOver = false;
    render();
    document.getElementById('status').textContent = 'Beurt van ' + sym(firstPlayer);
    if (mode === 'ai' && firstPlayer === 'O') {
      setTimeout(() => makeMove(aiMove()), 400);
    }
  }
 
  function checkWinner(b) {
    for (let [a, c, d] of wins) {
      if (b[a] && b[a] === b[c] && b[a] === b[d]) return { winner: b[a], line: [a, c, d] };
    }
    if (b.every(c => c)) return { winner: 'D' };
    return null;
  }
 
  function minimax(b, isMax) {
    const r = checkWinner(b);
    if (r) return r.winner === 'O' ? 10 : r.winner === 'X' ? -10 : 0;
    let best = isMax ? -Infinity : Infinity;
    for (let i = 0; i < 9; i++) {
      if (!b[i]) {
        b[i] = isMax ? 'O' : 'X';
        const val = minimax([...b], !isMax);
        b[i] = '';
        best = isMax ? Math.max(best, val) : Math.min(best, val);
      }
    }
    return best;
  }
 
  function aiMove() {
    let best = -Infinity, move = -1;
    for (let i = 0; i < 9; i++) {
      if (!board[i]) {
        board[i] = 'O';
        const val = minimax([...board], false);
        board[i] = '';
        if (val > best) { best = val; move = i; }
      }
    }
    return move;
  }
 
  function click(i) {
    if (gameOver || board[i]) return;
    if (mode === 'ai' && current === 'O') return;
    makeMove(i);
    if (!gameOver && mode === 'ai' && current === 'O') {
      setTimeout(() => makeMove(aiMove()), 300);
    }
  }
 
  function makeMove(i) {
    board[i] = current;
    const result = checkWinner(board);
    if (result) {
      gameOver = true;
      if (result.winner === 'D') {
        scores.D++;
        document.getElementById('status').textContent = 'Gelijkspel!';
        render([]);
      } else {
        scores[result.winner]++;
        document.getElementById('status').textContent = sym(result.winner) + ' wint!';
        render(result.line);
      }
    } else {
      current = current === 'X' ? 'O' : 'X';
      document.getElementById('status').textContent = 'Beurt van ' + sym(current);
      render();
    }
    const xw = document.getElementById('xw');
    const ow = document.getElementById('ow');
    if (xw) xw.textContent = scores.X;
    if (ow) ow.textContent = scores.O;
    document.getElementById('dw').textContent = scores.D;
  }
 
  function render(line) {
    const bd = document.getElementById('board');
    bd.innerHTML = '';
    board.forEach((v, i) => {
      const cell = document.createElement('div');
      cell.className = 'cell' + (v ? ' taken' : '') + (line && line.includes(i) ? ' win' : '');
      cell.textContent = v ? sym(v) : '';
      cell.onclick = () => click(i);
      bd.appendChild(cell);
    });
  }
 
  buildGrids();
</script> 
  
</div>
</body>
</html>
