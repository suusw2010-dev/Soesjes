    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 2rem;
      background: #f48fb1;
      border-radius: 16px;
      border: 1px solid #e07a9a;
      max-width: 420px;
      width: 95vw;
    }
 
    h1 { font-size: 22px; font-weight: 500; color: #1a1a18; }
    h2 { font-size: 16px; font-weight: 500; color: #1a1a18; text-align: center; }
 
    button {
      padding: 8px 20px; font-size: 14px; border-radius: 8px;
      border: 1px solid #ccc; background: transparent; color: #1a1a18; cursor: pointer;
    }
    button:hover { background: #f9c8d8; }
 
    #picker { display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
    .player-pick { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 100%; }
 
    .emoji-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      width: 100%;
    }
 
    .emoji-btn {
      font-size: 32px; padding: 10px; border-radius: 10px;
      border: 2px solid transparent; background: #fff;
      cursor: pointer; transition: border 0.1s, background 0.1s; text-align: center;
    }
    .emoji-btn:hover { background: #fce4ec; }
    .emoji-btn.selected { border: 2px solid #c2185b; background: #fce4ec; }
    .emoji-btn.disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
 
    .start-btn {
      padding: 12px 32px; font-size: 16px; border-radius: 10px;
      border: none; background: #c2185b; color: #fff; cursor: pointer; font-weight: 500;
    }
    .start-btn:hover { background: #ad1457; }
    .start-btn:disabled { opacity: 0.4; cursor: not-allowed; }
 
    #game { display: none; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
    .controls { display: flex; gap: 16px; align-items: center; }
    #status { font-size: 16px; font-weight: 500; color: #1a1a18; }
 
    .mode { display: flex; gap: 16px; }
    .mode label { font-size: 13px; color: #555; display: flex; align-items: center; gap: 6px; cursor: pointer; }
 
    #board { display: grid; grid-template-columns: repeat(3, 100px); gap: 8px; }
 
    .cell {
      width: 100px; height: 100px; border: 1px solid #e07a9a;
      display: flex; align-items: center; justify-content: center;
      font-size: 44px; cursor: pointer; background: #fff;
      border-radius: 8px; transition: background 0.1s; user-select: none;
    }
    .cell:hover:not(.taken) { background: #fce4ec; }
    .cell.taken { cursor: default; }
    .cell.win { background: #f8bbd0; border-color: #c2185b; }
 
    .score { display: flex; gap: 24px; font-size: 13px; color: #555; }
    .score b { color: #1a1a18; }
 
    .back-btn {
      font-size: 12px; color: #888; border: none;
      background: transparent; cursor: pointer; text-decoration: underline; padding: 0;
    }
    .back-btn:hover { color: #333; background: transparent; }
  </style>
</head>
<body>
 
<div class="container">
  <h1>🎮 Tic Tac Toe</h1>
 
  <div id="picker">
    <div class="player-pick">
      <h2>Speler 1 — kies je emoji</h2>
      <div class="emoji-grid" id="grid-p1"></div>
    </div>
    <div class="player-pick">
      <h2>Speler 2 — kies je emoji</h2>
      <div class="emoji-grid" id="grid-p2"></div>
    </div>
    <button class="start-btn" id="start-btn" onclick="startGame()" disabled>Spelen!</button>
  </div>
 
  <div id="game">
    <div id="status"></div>
    <div class="mode">
      <label><input type="radio" name="mode" value="2p" checked onchange="setMode(this.value)"> 2 spelers</label>
      <label><input type="radio" name="mode" value="ai" onchange="setMode(this.value)"> Tegen computer</label>
    </div>
    <div id="board"></div>
    <div class="score">
      <span id="score-x"></span>
      <span>Gelijk: <b id="dw">0</b></span>
      <span id="score-o"></span>
    </div>
    <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center;">
      <button onclick="nextGame()">🔄 Opnieuw beginnen</button>
      <button class="back-btn" onclick="goBack()">← Andere emoji kiezen</button>
    </div>
  </div>
</div>
 
<script>
  const emojis = ['🐱','🐰','❤️','🍩','⭐','🐶','🦆','🌸'];
  let p1 = null, p2 = null;
  let board = Array(9).fill('');
  let current = 'X';
  let gameOver = false;
  let mode = '2p';
  let scores = {X: 0, O: 0, D: 0};
  let firstPlayer = 'X'; // wisselt na elk spel
  const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
 
  function buildGrids() {
    ['p1','p2'].forEach(player => {
      const grid = document.getElementById('grid-' + player);
      grid.innerHTML = '';
      emojis.forEach(e => {
        const btn = document.createElement('button');
        btn.className = 'emoji-btn';
        btn.textContent = e;
        btn.id = player + '-' + e;
        btn.onclick = () => selectEmoji(player, e);
        grid.appendChild(btn);
      });
    });
  }
 
  function selectEmoji(player, emoji) {
    if (player === 'p1') {
      p1 = emoji;
      document.querySelectorAll('#grid-p1 .emoji-btn').forEach(b => b.classList.remove('selected'));
    } else {
      p2 = emoji;
      document.querySelectorAll('#grid-p2 .emoji-btn').forEach(b => b.classList.remove('selected'));
    }
    document.getElementById(player + '-' + emoji).classList.add('selected');
    updateDisabled();
    document.getElementById('start-btn').disabled = !(p1 && p2 && p1 !== p2);
  }
 
  function updateDisabled() {
    emojis.forEach(e => {
      const b1 = document.getElementById('p1-' + e);
      const b2 = document.getElementById('p2-' + e);
      if (b1) b1.classList.toggle('disabled', e === p2);
      if (b2) b2.classList.toggle('disabled', e === p1);
    });
  }
 
  function startGame() {
    document.getElementById('picker').style.display = 'none';
    document.getElementById('game').style.display = 'flex';
    scores = {X: 0, O: 0, D: 0};
    firstPlayer = 'X';
    document.getElementById('score-x').innerHTML = p1 + ' wint: <b id="xw">0</b>';
    document.getElementById('score-o').innerHTML = p2 + ' wint: <b id="ow">0</b>';
    resetGame();
  }
 
  function nextGame() {
    // wissel wie er eerst begint
    firstPlayer = firstPlayer === 'X' ? 'O' : 'X';
    resetGame();
  }
 
  function goBack() {
    document.getElementById('game').style.display = 'none';
    document.getElementById('picker').style.display = 'flex';
  }
 
  function setMode(m) { mode = m; resetGame(); }
 
  function sym(player) { return player === 'X' ? p1 : p2; }
 
  function resetGame() {
    board = Array(9).fill('');
    current = firstPlayer;
    gameOver = false;
    render();
    document.getElementById('status').textContent = 'Beurt van ' + sym(firstPlayer);
    if (mode === 'ai' && firstPlayer === 'O') {
      setTimeout(() => makeMove(aiMove()), 400);
    }
  }
 
  function checkWinner(b) {
    for (let [a, c, d] of wins) {
      if (b[a] && b[a] === b[c] && b[a] === b[d]) return { winner: b[a], line: [a, c, d] };
    }
    if (b.every(c => c)) return { winner: 'D' };
    return null;
  }
 
  function minimax(b, isMax) {
    const r = checkWinner(b);
    if (r) return r.winner === 'O' ? 10 : r.winner === 'X' ? -10 : 0;
    let best = isMax ? -Infinity : Infinity;
    for (let i = 0; i < 9; i++) {
      if (!b[i]) {
        b[i] = isMax ? 'O' : 'X';
        const val = minimax([...b], !isMax);
        b[i] = '';
        best = isMax ? Math.max(best, val) : Math.min(best, val);
      }
    }
    return best;
  }
 
  function aiMove() {
    let best = -Infinity, move = -1;
    for (let i = 0; i < 9; i++) {
      if (!board[i]) {
        board[i] = 'O';
        const val = minimax([...board], false);
        board[i] = '';
        if (val > best) { best = val; move = i; }
      }
    }
    return move;
  }
 
  function click(i) {
    if (gameOver || board[i]) return;
    if (mode === 'ai' && current === 'O') return;
    makeMove(i);
    if (!gameOver && mode === 'ai' && current === 'O') {
      setTimeout(() => makeMove(aiMove()), 300);
    }
  }
 
  function makeMove(i) {
    board[i] = current;
    const result = checkWinner(board);
    if (result) {
      gameOver = true;
      if (result.winner === 'D') {
        scores.D++;
        document.getElementById('status').textContent = 'Gelijkspel!';
        render([]);
      } else {
        scores[result.winner]++;
        document.getElementById('status').textContent = sym(result.winner) + ' wint!';
        render(result.line);
      }
    } else {
      current = current === 'X' ? 'O' : 'X';
      document.getElementById('status').textContent = 'Beurt van ' + sym(current);
      render();
    }
    const xw = document.getElementById('xw');
    const ow = document.getElementById('ow');
    if (xw) xw.textContent = scores.X;
    if (ow) ow.textContent = scores.O;
    document.getElementById('dw').textContent = scores.D;
  }
 
  function render(line) {
    const bd = document.getElementById('board');
    bd.innerHTML = '';
    board.forEach((v, i) => {
      const cell = document.createElement('div');
      cell.className = 'cell' + (v ? ' taken' : '') + (line && line.includes(i) ? ' win' : '');
      cell.textContent = v ? sym(v) : '';
      cell.onclick = () => click(i);
      bd.appendChild(cell);
    });
  }
 
  buildGrids();
</script>

</body>
</html>
